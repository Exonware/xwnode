# pytest configuration for data operations tests
# Following GUIDE_TEST.md standards

[pytest]
# Test discovery
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Markers for test categorization
markers =
    xwnode_core: Core functionality and integration tests
    xwnode_unit: Unit tests for individual components
    xwnode_integration: Integration tests across modules
    xwnode_performance: Performance and benchmarking tests
    xwnode_v1: Tests for V1 (Streaming) implementation
    xwnode_v2: Tests for V2 (Indexed) implementation
    create_ops: CREATE operations tests
    read_ops: READ operations tests
    update_ops: UPDATE operations tests
    delete_ops: DELETE operations tests
    list_query_ops: LIST/QUERY operations tests
    search_ops: SEARCH operations tests
    bulk_ops: BULK operations tests
    transaction_ops: TRANSACTION operations tests
    index_ops: INDEX operations tests
    validation_ops: VALIDATION operations tests
    aggregation_ops: AGGREGATION operations tests
    file_ops: FILE operations tests
    concurrency_ops: CONCURRENCY operations tests
    async_ops: ASYNC operations tests
    utility_ops: UTILITY operations tests
    monitoring_ops: MONITORING operations tests

# Test output configuration
# CRITICAL: Following GUIDE_TEST.md - Never hide problems!
addopts =
    -v
    --tb=short
    --strict-markers

# Coverage configuration (if pytest-cov is installed)
# addopts =
#     -v
#     --tb=short
#     --strict-markers
#     --cov=xwnode.examples.x5
#     --cov-report=term-missing
#     --cov-report=html

# FORBIDDEN OPTIONS - DO NOT ADD THESE (GUIDE_TEST.md compliance):
# --disable-warnings # Hides real problems!
# --maxfail=10 # Continues past failures!
# --tb=no # Hides debugging info!
# -q / --quiet # Hides important output!
# -p no:warnings # Disables warnings plugin!
# --ignore=path # Skips tests instead of fixing!
# filterwarnings = ignore # Suppresses warnings!

