[pytest]
# Test discovery and execution
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
norecursedirs = tests/delete tests/1.unit/_delete_old_tests tests/*/_delete* _delete* MIGRATE

# Async support
asyncio_mode = auto

# Markers for test categorization (aligned with GUIDELINES_TEST.md)
markers =
    xwnode_core: Core functionality and integration tests
    xwnode_unit: Unit tests for individual components
    xwnode_integration: Integration tests across modules
    xwnode_advance: Advance quality tests (v1.0.0+)
    xwnode_security: Security excellence tests (Priority #1)
    xwnode_usability: Usability excellence tests (Priority #2)
    xwnode_maintainability: Maintainability excellence tests (Priority #3)
    xwnode_performance: Performance excellence tests (Priority #4)
    xwnode_extensibility: Extensibility excellence tests (Priority #5)
    xwnode_node_strategy: Node strategy specific tests
    xwnode_edge_strategy: Edge strategy specific tests
    xwnode_query_strategy: Query strategy specific tests
    performance: Performance benchmarks (generic marker)

# Test output configuration
# ⚠️ CRITICAL: Do NOT use --disable-warnings or --maxfail=10
# These flags hide real problems and violate root cause fixing principles
addopts = 
    -v
    --tb=short
    --strict-markers
    -x

# Warning filters - only show warnings from xwnode, hide external package warnings
filterwarnings =
    default::DeprecationWarning:exonware.xwnode.*
    default::Warning:exonware.xwnode.*
    ignore::DeprecationWarning:google.*
    ignore::DeprecationWarning:pydgraph.*
    ignore::DeprecationWarning:protobuf.*
    ignore::DeprecationWarning:grpc.*
    ignore::DeprecationWarning:pandas.*
    ignore::DeprecationWarning:numpy.*
    ignore::DeprecationWarning:pyarrow.*
    ignore::DeprecationWarning:tables.*
    ignore::DeprecationWarning:zarr.*
    ignore::DeprecationWarning:h5py.*
    ignore::DeprecationWarning:lmdb.*
    ignore::DeprecationWarning:dbm.*
    ignore::DeprecationWarning:shelve.*

