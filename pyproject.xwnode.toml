# Source size (src/*): ~2.50 MB
[build-system]
requires = [
    "hatchling",
]
build-backend = "hatchling.build"

[project]
name = "xwnode"
dynamic = [
    "version",
]
description = "Convenience wrapper for exonware-xwnode - provides 'import xwnode' alias"
readme = "README.md"
requires-python = ">=3.12"
keywords = [
    "node",
    "graph",
    "computation",
    "data-processing",
    "workflow",
    "exonware",
]
classifiers = []
dependencies = [
    "exonware-xwnode",
]
exonware-xwsystem = "2758230 ; 2.63 MB"
"numpy>" = "1.24.0\",  # file-size=52803492 ; 50.36 MB"
pip = "11430259 ; 10.90 MB"
"scikit-learn>" = "1.2.0\",  # file-size=43016103 ; 41.02 MB"
"scipy>" = "1.10.0\",  # file-size=140860699 ; 134.34 MB"
authors = []
"{{name" = "eXonware Backend Team"

[project.license]
text = "MIT"

[project.optional-dependencies]
dev = [
    "exonware-xwnode[dev]",
]
lazy = [
    "exonware-xwnode[lazy]",
]
full = [
    "exonware-xwnode[full]",
]

[project.urls]
Homepage = "https://exonware.com"
Repository = "https://github.com/exonware/xwnode"
Documentation = "https://github.com/exonware/xwnode#readme"
Subtree = "https://github.com/exonware/xwnode.git"

[tool.black]
line-length = 88
target-version = [
    "py312",
]

[tool.isort]
profile = "black"
line_length = 88

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_any_generics = true
disallow_untyped_calls = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true

[tool.pytest.ini_options]
testpaths = [
    "tests",
]
python_files = [
    "test_*.py",
]
python_classes = [
    "Test*",
]
python_functions = [
    "test_*",
]
addopts = "-v --tb=short"
markers = []

[tool.hatch.version]
path = "src/exonware/xwnode/version.py"

[tool.hatch.build.targets.wheel]
only-include = [
    "README.md",
    "src/xwnode_wrapper.py",
]

[tool.hatch.build.targets.sdist]
include = []
